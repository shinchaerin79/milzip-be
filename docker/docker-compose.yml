services:
  app:
    image: ${DOCKER_IMAGE}
    container_name: milzip
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
    depends_on:
      db:
        condition: service_healthy
    networks:
      - milzip-network

  db:
    image: pgvector/pgvector:pg15
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - milzip-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - milzip-network

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    ports:
      - "9999:8080"
    environment:
      TZ: Asia/Seoul
      DOZZLE_LEVEL: info
      DOZZLE_TAILSIZE: 300
      DOZZLE_FILTER: status=running
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - milzip-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  milzip-network:
    driver: bridge

volumes:
  milzip-postgres-data:
